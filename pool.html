<!DOCTYPE html>
<html lang="pt-br" class="transition-colors duration-300">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAGING - Pool Manager SaaS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { slate: { 850: '#1e293b', 950: '#020617' } }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        html.dark { background-color: #020617 !important; }
        html.dark body { background-color: #020617 !important; color: #f1f5f9 !important; }
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; min-height: 100vh; }
        .admin-only, .client-only { display: none; }
        body.modo-admin .admin-only { display: block; }
        body.modo-cliente .client-only { display: block; }
        /* Badge de Staging */
        .staging-badge { position: fixed; top: 10px; right: 10px; background: #f59e0b; color: black; padding: 4px 12px; border-radius: 20px; font-weight: 900; font-size: 10px; z-index: 100; pointer-events: none; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 p-4 md:p-8">

<div class="staging-badge">Ambiente de Testes</div>

<div id="modalImport" onclick="fecharModal()">
    <div class="bg-white dark:bg-slate-900 w-full max-w-lg p-8 rounded-3xl shadow-2xl mx-4" onclick="event.stopPropagation()">
        <div class="flex items-center gap-3 mb-4">
            <div class="p-3 bg-emerald-100 dark:bg-emerald-900/30 rounded-2xl text-emerald-600">
                <i data-lucide="file-spreadsheet"></i>
            </div>
            <div>
                <h3 class="text-xl font-black dark:text-white">Importar para STAGING</h3>
                <p class="text-xs text-slate-500">Isso não afetará os dados de produção.</p>
            </div>
        </div>

        <div class="border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl p-8 text-center bg-slate-50 dark:bg-slate-850/50">
            <input type="file" id="arquivoCSV" accept=".csv" class="hidden" onchange="validarArquivo(this)">
            <label for="arquivoCSV" class="cursor-pointer group">
                <i data-lucide="upload-cloud" class="w-10 h-10 mx-auto mb-2 text-slate-300 group-hover:text-blue-500 transition"></i>
                <p class="text-sm font-bold text-slate-600 dark:text-slate-400" id="nomeArquivo">Clique para selecionar o CSV</p>
            </label>
        </div>

        <div class="flex gap-3 mt-6">
            <button onclick="fecharModal()" class="flex-1 py-3 font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition">Cancelar</button>
            <button onclick="processarCSV()" class="flex-1 py-3 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 shadow-lg shadow-emerald-500/20 transition">Processar Planilha</button>
        </div>
    </div>
</div>

<div class="max-w-6xl mx-auto space-y-6">
    <div class="admin-only space-y-6">
        <header class="bg-amber-50 dark:bg-amber-900/10 p-6 rounded-2xl border border-amber-200 dark:border-amber-800 flex flex-col lg:flex-row justify-between items-center gap-4 shadow-sm">
            <div class="w-full lg:w-auto text-center lg:text-left">
                <h1 class="text-2xl font-black tracking-tight dark:text-white uppercase italic">Pool Manager <span class="text-amber-600">STAGING</span></h1>
                <select id="filtroMes" onchange="mudarMes(this.value)" class="mt-2 bg-slate-100 dark:bg-slate-800 dark:text-white border-none rounded-lg px-3 py-1.5 text-sm font-bold focus:ring-2 focus:ring-blue-500 cursor-pointer"></select>
            </div>
            
            <div class="flex flex-wrap justify-center items-center gap-2">
                <div class="relative group mr-2">
                    <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="inputPesquisa" oninput="renderizarTabela()" placeholder="Buscar..." class="bg-white dark:bg-slate-800 dark:text-white pl-9 pr-4 py-2 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none border-none w-40 md:w-56 transition-all">
                </div>
                <button onclick="exportarExcel()" class="bg-emerald-600 text-white px-4 py-2.5 rounded-xl font-bold flex hover:bg-emerald-700 transition" title="Exportar CSV"><i data-lucide="download" class="w-4 h-4"></i></button>
                <button onclick="abrirModal()" class="bg-slate-100 dark:bg-slate-800 dark:text-white px-4 py-2.5 rounded-xl font-bold flex hover:bg-slate-200 transition" title="Importar CSV"><i data-lucide="file-spreadsheet" class="w-4 h-4 text-emerald-500"></i></button>
                <button onclick="adicionarPessoa()" class="bg-blue-600 text-white px-4 py-2.5 rounded-xl font-bold flex hover:bg-blue-700 transition" title="Novo Participante"><i data-lucide="plus" class="w-4 h-4"></i></button>
                <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-yellow-400 border dark:border-slate-700">
                    <i data-lucide="moon" class="dark:hidden"></i><i data-lucide="sun" class="hidden dark:block"></i>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-1 italic">Previsão (Teste)</p>
                <div class="text-3xl font-black dark:text-white italic text-slate-800">R$ <span id="tGeral">0,00</span></div>
            </div>
            <div class="bg-emerald-500 p-6 rounded-2xl text-white shadow-xl shadow-emerald-500/20">
                <p class="opacity-70 text-[10px] font-black uppercase tracking-widest mb-1 italic text-white">Pago (Teste)</p>
                <div class="text-3xl font-black italic">R$ <span id="tPago">0,00</span></div>
            </div>
            <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 border-l-4 border-l-rose-500 shadow-sm">
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1 italic">Pendente (Teste)</p>
                <div class="text-3xl font-black text-rose-500 italic">R$ <span id="tPend">0,00</span></div>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 dark:bg-slate-850 border-b border-slate-200 dark:border-slate-800 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <tr>
                            <th class="px-6 py-4 cursor-pointer" onclick="toggleOrdemAlfabetica()">Participante</th>
                            <th class="px-6 py-4 text-center">Valor</th>
                            <th class="px-6 py-4 text-center italic">Adiantadas</th>
                            <th class="px-6 py-4 text-center">Status</th>
                            <th class="px-6 py-4 text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="client-only max-w-md mx-auto py-10" id="portalCliente"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBKuldmBQEuNyEWVZ-0sPW0ItGn8QqPxd8",
        authDomain: "pool-e439a.firebaseapp.com",
        databaseURL: "https://pool-e439a-default-rtdb.firebaseio.com",
        projectId: "pool-e439a",
        storageBucket: "pool-e439a.firebasestorage.app",
        messagingSenderId: "94463318724",
        appId: "1:94463318724:web:05208de1c8a9cbfd014791"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // MUDANÇA PRINCIPAL: Todo o caminho de dados agora começa com 'staging/'
    const ROOT_DB = "staging"; 

    let mesAtual = `${String(new Date().getMonth() + 1).padStart(2, '0')}-${new Date().getFullYear()}`;
    let dadosLocais = [];
    let filtroStatus = 'todos';
    let ordemCrescente = true;
    let idCliente = new URLSearchParams(window.location.search).get('p');
    let configGeral = { chavePix: "", valorPadrao: 0 };

    function iniciar() {
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        // Configurações também ficam separadas no staging
        db.ref(`${ROOT_DB}/configuracoes`).on('value', s => { 
            configGeral = s.val() || { chavePix: "TESTE-PIX", valorPadrao: 50 }; 
        });
        gerarOpcoesMes();
        if (idCliente) { carregarPortalCliente(); document.body.className = "modo-cliente"; }
        else { carregarDadosAdmin(); document.body.className = "modo-admin"; }
        lucide.createIcons();
    }

    function carregarDadosAdmin() {
        db.ref(`${ROOT_DB}/cobrancas/${mesAtual}`).on('value', s => {
            const dados = s.val() || {};
            dadosLocais = Object.keys(dados).map(id => ({ id, ...dados[id] }));
            renderizarTabela();
        });
    }

    // [O resto das funções de renderização permanecem iguais, apenas atualizando as chamadas de banco]

    function editar(id, c, v) { db.ref(`${ROOT_DB}/cobrancas/${mesAtual}/${id}`).update({ [c]: v }); }
    function togglePago(id, s) { db.ref(`${ROOT_DB}/cobrancas/${mesAtual}/${id}`).update({ pago: !s }); }
    function excluir(id) { if(confirm("Apagar em STAGING?")) db.ref(`${ROOT_DB}/cobrancas/${mesAtual}/${id}`).remove(); }
    
    function processarCSV() {
        const fileInput = document.getElementById('arquivoCSV');
        const file = fileInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const linhas = e.target.result.split('\n');
            const updates = {};
            linhas.forEach((linha, i) => {
                if (i === 0 || !linha.trim()) return;
                let cols = linha.split(/[;,]/);
                let id = (Date.now() + i); 
                updates[id] = { 
                    nome: cols[1] ? cols[1].trim() : "Teste Staging", 
                    tel: cols[2] ? cols[2].trim() : "5511999999999", 
                    valor: cols[3] ? parseFloat(cols[3].replace(',', '.')) : 0, 
                    adiantadas: cols[4] ? parseInt(cols[4]) : 0,
                    pago: false,
                    msgEnviada: false 
                };
            });
            db.ref(`${ROOT_DB}/cobrancas/${mesAtual}`).update(updates).then(() => {
                fecharModal();
                alert("Dados importados para o AMBIENTE DE TESTES!");
            });
        };
        reader.readAsText(file, 'UTF-8');
    }

    function adicionarPessoa() { 
        const n = prompt("Nome (Novo Teste):"); 
        if(n) db.ref(`${ROOT_DB}/cobrancas/${mesAtual}/${Date.now()}`).set({ 
            nome: n, tel: "55", valor: 0, adiantadas: 0, pago: false, msgEnviada: false 
        }); 
    }

    // Função de Zap no Staging alterada para não abrir o chat real se você quiser (opcional)
    function enviarZap(id, n, t, v) { 
        db.ref(`${ROOT_DB}/cobrancas/${mesAtual}/${id}`).update({ msgEnviada: true }); 
        alert("Simulação: Mensagem enviada para " + n);
        // Descomente a linha abaixo se quiser que ele realmente tente abrir o WhatsApp no staging
        // const link = window.location.href.split('?')[0] + "?p=" + id;
        // const msg = encodeURIComponent(`[TESTE STAGING] Olá, ${n}!\nValor: R$ ${v.toFixed(2)}`);
        // window.open(`https://wa.me/${t}?text=${msg}`); 
    }

    // Funções auxiliares mantidas
    function renderizarTabela() {
        const corpo = document.getElementById('corpoTabela');
        const termoBusca = document.getElementById('inputPesquisa').value.toLowerCase();
        if(!corpo) return;
        let filtrados = [...dadosLocais];
        if (termoBusca) filtrados = filtrados.filter(p => p.nome.toLowerCase().includes(termoBusca));
        corpo.innerHTML = "";
        let t = 0, pg = 0, pd = 0;
        filtrados.forEach(p => {
            const val = parseFloat(p.valor) || 0;
            t += val; if(p.pago) pg += val; else pd += val;
            corpo.innerHTML += `
                <tr class="hover:bg-amber-50 dark:hover:bg-slate-800 transition">
                    <td class="px-6 py-4">
                        <input type="text" value="${p.nome}" onblur="editar('${p.id}','nome',this.value)" class="editable-input font-bold w-full">
                    </td>
                    <td class="px-6 py-4 text-center font-mono font-bold italic">R$ ${val.toFixed(2)}</td>
                    <td class="px-6 py-4 text-center">${p.adiantadas || 0}</td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="togglePago('${p.id}',${p.pago})" class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${p.pago ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">
                            ${p.pago ? 'Pago' : 'Pendente'}
                        </button>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="enviarZap('${p.id}','${p.nome}','${p.tel}',${val})" class="p-2 text-slate-400"><i data-lucide="send" class="w-4 h-4"></i></button>
                        <button onclick="excluir('${p.id}')" class="p-2 text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                </tr>`;
        });
        document.getElementById('tGeral').innerText = t.toLocaleString('pt-br',{minimumFractionDigits:2});
        document.getElementById('tPago').innerText = pg.toLocaleString('pt-br',{minimumFractionDigits:2});
        document.getElementById('tPend').innerText = pd.toLocaleString('pt-br',{minimumFractionDigits:2});
        lucide.createIcons();
    }

    function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }
    function fecharModal() { document.getElementById('modalImport').classList.remove('flex'); }
    function abrirModal() { document.getElementById('modalImport').classList.add('flex'); }
    function mudarMes(v) { mesAtual = v; carregarDadosAdmin(); }
    function gerarOpcoesMes() { const s = document.getElementById('filtroMes'); if(!s) return; for(let i = -1; i <= 2; i++) { const d = new Date(); d.setMonth(d.getMonth() + i); const k = `${String(d.getMonth() + 1).padStart(2, '0')}-${d.getFullYear()}`; const o = document.createElement('option'); o.value = k; o.innerText = d.toLocaleDateString('pt-br', {month: 'long', year: 'numeric'}); o.selected = k === mesAtual; s.appendChild(o); } }
    function validarArquivo(i) { document.getElementById('nomeArquivo').innerText = i.files[0].name; }

    iniciar();
</script>
</body>
</html>
