<!DOCTYPE html>
<html lang="pt-br" class="transition-colors duration-300">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Billing Pro - Experiência Premium</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#1e293b', 950: '#020617' }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Garantir que o fundo mude em todo o documento */
        html.dark, html.dark body { background-color: #020617 !important; }

        .admin-only, .client-only { display: none; }
        body.modo-admin .admin-only { display: block; }
        body.modo-cliente .client-only { display: block; }
        
        .editable-input { 
            background: transparent; border: 1px solid transparent; transition: all 0.2s; 
            padding: 2px 5px; border-radius: 4px;
        }
        .dark .editable-input:hover { background: #1e293b; border-color: #334155; }
        .editable-input:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .editable-input:focus { background: white; border-color: #3b82f6; outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        .dark .editable-input:focus { background: #0f172a; color: white; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

<div class="max-w-6xl mx-auto px-4 py-6">
    
    <div class="admin-only space-y-6">
        <header class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm transition-colors">
            <div class="flex items-center justify-between w-full lg:w-auto">
                <div>
                    <h1 class="text-2xl font-black text-slate-800 dark:text-white flex items-center gap-2 tracking-tight">
                        <i data-lucide="sparkles" class="text-blue-600"></i> Pool Manager
                    </h1>
                    <select id="filtroMes" onchange="mudarMes(this.value)" class="mt-2 bg-slate-100 dark:bg-slate-800 border-none rounded-lg px-3 py-1.5 text-sm font-semibold focus:ring-2 focus:ring-blue-500 cursor-pointer">
                    </select>
                </div>
                <button onclick="toggleDarkMode()" class="lg:hidden p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
                    <i data-lucide="moon" class="dark:hidden w-5 h-5"></i>
                    <i data-lucide="sun" class="hidden dark:block w-5 h-5"></i>
                </button>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <div class="bg-slate-100 dark:bg-slate-800 p-1 rounded-xl flex gap-1">
                    <button onclick="setFiltroStatus('todos')" class="filter-btn active bg-white dark:bg-slate-700 shadow-sm px-4 py-1.5 rounded-lg text-sm font-medium">Todos</button>
                    <button onclick="setFiltroStatus('pendente')" class="filter-btn px-4 py-1.5 rounded-lg text-sm font-medium opacity-60">Pendentes</button>
                    <button onclick="setFiltroStatus('pago')" class="filter-btn px-4 py-1.5 rounded-lg text-sm font-medium opacity-60">Pagos</button>
                </div>
                
                <button onclick="toggleDarkMode()" class="hidden lg:flex p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:scale-105 transition">
                    <i data-lucide="moon" class="dark:hidden w-5 h-5"></i>
                    <i data-lucide="sun" class="hidden dark:block w-5 h-5"></i>
                </button>

                <button onclick="adicionarPessoa()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 transition shadow-lg shadow-blue-500/20">
                    <i data-lucide="user-plus" class="w-4 h-4"></i> Novo
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-slate-900 dark:bg-blue-950 p-4 rounded-xl text-white flex items-center gap-4 border border-slate-800">
                <i data-lucide="qr-code" class="text-blue-400"></i>
                <div class="flex-1">
                    <p class="text-[10px] uppercase font-black opacity-50 tracking-widest">Chave PIX</p>
                    <input type="text" id="chavePix" onchange="salvarConfig('chavePix', this.value)" class="bg-transparent border-none p-0 text-sm w-full focus:ring-0 font-mono" placeholder="Sua chave...">
                </div>
            </div>
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4 rounded-xl flex items-center gap-4">
                <i data-lucide="coins" class="text-blue-600"></i>
                <div class="flex-1">
                    <p class="text-[10px] uppercase font-black text-slate-400 tracking-widest">Valor Padrão (R$)</p>
                    <input type="number" id="valorPadrao" onchange="salvarConfig('valorPadrao', parseFloat(this.value))" class="bg-transparent border-none p-0 text-sm w-full focus:ring-0 font-bold" placeholder="50.00">
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Previsão</p>
                <div class="text-3xl font-black italic">R$ <span id="tGeral">0,00</span></div>
            </div>
            <div class="bg-emerald-500 p-6 rounded-2xl shadow-xl shadow-emerald-500/20 text-white">
                <p class="opacity-70 text-[10px] font-black uppercase tracking-widest mb-1">Confirmado</p>
                <div class="text-3xl font-black italic">R$ <span id="tPago">0,00</span></div>
            </div>
            <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border-l-4 border-l-rose-500 border border-slate-200 dark:border-slate-800 shadow-sm">
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">A receber</p>
                <div class="text-3xl font-black text-rose-500 italic">R$ <span id="tPend">0,00</span></div>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden transition-colors">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 dark:bg-slate-850 border-b border-slate-200 dark:border-slate-800">
                        <tr>
                            <th class="px-6 py-4">
                                <button onclick="toggleOrdemAlfabetica()" class="flex items-center gap-1 text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">
                                    Participante <i data-lucide="chevrons-up-down" class="w-3 h-3"></i>
                                </button>
                            </th>
                            <th class="px-6 py-4 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest">Valor</th>
                            <th class="px-6 py-4 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest">Status</th>
                            <th class="px-6 py-4 text-right text-[10px] font-black text-slate-400 uppercase tracking-widest">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="client-only max-w-md mx-auto py-10">
        <div class="bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100 dark:border-slate-800">
            <div class="bg-slate-900 dark:bg-blue-600 p-12 text-center transition-colors">
                <p class="text-blue-400 dark:text-blue-200 text-xs font-black uppercase tracking-widest mb-3" id="cNome">Olá!</p>
                <h2 class="text-white text-6xl font-black tracking-tighter">R$ <span id="cValor">0,00</span></h2>
            </div>
            <div class="p-10 space-y-8 text-center">
                <div class="space-y-2">
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Pague via Chave PIX</p>
                    <p id="cChavePixExibicao" class="text-slate-700 dark:text-slate-300 font-mono font-bold text-lg break-all">---</p>
                </div>
                
                <div class="space-y-4">
                    <input type="file" id="fotoInput" accept="image/*" class="hidden" onchange="lerFoto(this)">
                    <label for="fotoInput" class="flex flex-col items-center justify-center gap-4 w-full bg-slate-50 dark:bg-slate-850 border-2 border-dashed border-slate-200 dark:border-slate-700 p-8 rounded-[2rem] cursor-pointer hover:border-blue-500 transition-all group">
                        <i data-lucide="image-plus" class="w-8 h-8 text-slate-300 group-hover:text-blue-500"></i>
                        <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Anexar Comprovante</span>
                    </label>
                    <img id="imgPreview" class="w-full rounded-[1.5rem] hidden shadow-2xl border-4 border-white dark:border-slate-800">
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBKuldmBQEuNyEWVZ-0sPW0ItGn8QqPxd8",
        authDomain: "pool-e439a.firebaseapp.com",
        databaseURL: "https://pool-e439a-default-rtdb.firebaseio.com",
        projectId: "pool-e439a",
        storageBucket: "pool-e439a.firebasestorage.app",
        messagingSenderId: "94463318724",
        appId: "1:94463318724:web:05208de1c8a9cbfd014791"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let mesAtual = `${String(new Date().getMonth() + 1).padStart(2, '0')}-${new Date().getFullYear()}`;
    let filtroStatus = 'todos';
    let ordemCrescente = true;
    let dadosLocais = [];
    let idCliente = new URLSearchParams(window.location.search).get('p');
    let configGeral = { chavePix: "", valorPadrao: 0 };

    function iniciar() {
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        gerarOpcoesMes();
        verificarResetMensal();
        
        db.ref('configuracoes').on('value', s => {
            configGeral = s.val() || { chavePix: "", valorPadrao: 0 };
            document.getElementById('chavePix').value = configGeral.chavePix;
            document.getElementById('valorPadrao').value = configGeral.valorPadrao;
            if(idCliente) document.getElementById('cChavePixExibicao').innerText = configGeral.chavePix;
        });

        if (idCliente) {
            document.body.className = "modo-cliente bg-slate-100 dark:bg-slate-950 transition-colors duration-300";
            carregarPortalCliente();
        } else {
            document.body.className = "modo-admin transition-colors duration-300";
            carregarDadosAdmin();
        }
        lucide.createIcons();
    }

    function toggleDarkMode() {
        const html = document.documentElement;
        if (html.classList.contains('dark')) {
            html.classList.remove('dark');
            localStorage.theme = 'light';
        } else {
            html.classList.add('dark');
            localStorage.theme = 'dark';
        }
    }

    async function verificarResetMensal() {
        const hoje = new Date();
        if (hoje.getDate() >= 20) {
            const prox = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 1);
            const keyProx = `${String(prox.getMonth() + 1).padStart(2, '0')}-${prox.getFullYear()}`;
            const s = await db.ref(`cobrancas/${keyProx}`).once('value');
            if (!s.exists()) {
                const atual = await db.ref(`cobrancas/${mesAtual}`).once('value');
                if (atual.exists()) {
                    const lista = atual.val();
                    const novaLista = {};
                    Object.keys(lista).forEach(id => { novaLista[id] = { ...lista[id], pago: false, comprovante: null }; });
                    await db.ref(`cobrancas/${keyProx}`).set(novaLista);
                }
            }
        }
    }

    function carregarDadosAdmin() {
        db.ref(`cobrancas/${mesAtual}`).on('value', snapshot => {
            const dados = snapshot.val() || {};
            dadosLocais = Object.keys(dados).map(id => ({ id, ...dados[id] }));
            renderizarTabela();
        });
    }

    function renderizarTabela() {
        const corpo = document.getElementById('corpoTabela');
        let filtrados = [...dadosLocais];
        if (filtroStatus !== 'todos') filtrados = filtrados.filter(p => filtroStatus === 'pago' ? p.pago : !p.pago);
        filtrados.sort((a, b) => ordemCrescente ? a.nome.localeCompare(b.nome) : b.nome.localeCompare(a.nome));

        corpo.innerHTML = "";
        let t = 0, pg = 0, pd = 0;

        filtrados.forEach(p => {
            const val = parseFloat(p.valor) || 0;
            t += val;
            if(p.pago) pg += val; else pd += val;

            corpo.innerHTML += `
                <tr class="group hover:bg-slate-50 dark:hover:bg-slate-850/50 transition">
                    <td class="px-6 py-4">
                        <input type="text" value="${p.nome}" onblur="editar('${p.id}','nome',this.value)" class="editable-input font-bold text-slate-700 dark:text-slate-200 w-full block">
                        <input type="text" value="${p.tel}" onblur="editar('${p.id}','tel',this.value)" class="editable-input text-[10px] text-slate-400 font-bold w-full block">
                    </td>
                    <td class="px-6 py-4 text-center font-mono font-bold text-slate-600 dark:text-slate-400">
                        R$ <input type="number" step="0.01" value="${val.toFixed(2)}" onblur="editar('${p.id}','valor',this.value)" class="editable-input w-20 text-center">
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="togglePago('${p.id}',${p.pago})" class="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest transition ${p.pago ? 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600' : 'bg-amber-100 dark:bg-amber-900/30 text-amber-600'}">
                            ${p.pago ? 'Pago' : 'Pendente'}
                        </button>
                    </td>
                    <td class="px-6 py-4 text-right space-x-1">
                        <button onclick="enviarZap('${p.id}','${p.nome}','${p.tel}',${val})" class="p-2 text-slate-400 hover:text-emerald-500 transition inline-flex"><i data-lucide="send" class="w-4 h-4"></i></button>
                        ${p.comprovante ? `<button onclick="verFoto('${p.comprovante}')" class="p-2 text-blue-500 hover:text-blue-400 transition inline-flex"><i data-lucide="eye" class="w-4 h-4"></i></button>` : ''}
                        <button onclick="excluir('${p.id}')" class="p-2 text-slate-300 dark:text-slate-700 hover:text-rose-500 transition inline-flex"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                </tr>`;
        });

        document.getElementById('tGeral').innerText = t.toLocaleString('pt-br',{minimumFractionDigits:2});
        document.getElementById('tPago').innerText = pg.toLocaleString('pt-br',{minimumFractionDigits:2});
        document.getElementById('tPend').innerText = pd.toLocaleString('pt-br',{minimumFractionDigits:2});
        lucide.createIcons();
    }

    function enviarZap(id, nome, tel, valor) {
        const link = window.location.href.split('?')[0] + "?p=" + id;
        
        // Formata o mês para o nome (Ex: Abril de 2026)
        const partes = mesAtual.split('-');
        const dataObjeto = new Date(partes[1], partes[0] - 1);
        const nomeMes = dataObjeto.toLocaleDateString('pt-br', { month: 'long', year: 'numeric' });

        const msg = encodeURIComponent(
            `Olá, ${nome}! Tudo bem? ✨\n\n` +
            `Passando para enviar sua cobrança referente a *${nomeMes}*.\n\n` +
            `💰 *Valor:* R$ ${valor.toFixed(2).replace('.', ',')}\n` +
            `🔑 *PIX:* ${configGeral.chavePix}\n\n` +
            `Para facilitar, você pode enviar o comprovante diretamente por este link:\n${link}\n\n` +
            `Qualquer dúvida, estou à disposição! 👍`
        );
        window.open(`https://wa.me/${tel}?text=${msg}`);
    }

    // Outras funções auxiliares mantidas
    function adicionarPessoa() {
        const nome = prompt("Nome do novo participante:");
        if(nome) {
            const id = Date.now();
            db.ref(`cobrancas/${mesAtual}/${id}`).set({ 
                nome, tel: "55", valor: configGeral.valorPadrao || 0, pago: false, comprovante: null 
            });
        }
    }
    function salvarConfig(campo, valor) { db.ref('configuracoes').update({ [campo]: valor }); }
    function toggleOrdemAlfabetica() { ordemCrescente = !ordemCrescente; renderizarTabela(); }
    function setFiltroStatus(s) { filtroStatus = s; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'bg-white', 'dark:bg-slate-700', 'shadow-sm')); event.target.classList.add('active', 'bg-white', 'dark:bg-slate-700', 'shadow-sm'); renderizarTabela(); }
    function mudarMes(v) { mesAtual = v; carregarDadosAdmin(); }
    function editar(id, campo, valor) { db.ref(`cobrancas/${mesAtual}/${id}`).update({ [campo]: valor }); }
    function togglePago(id, s) { db.ref(`cobrancas/${mesAtual}/${id}`).update({ pago: !s }); }
    function excluir(id) { if(confirm("Apagar participante?")) db.ref(`cobrancas/${mesAtual}/${id}`).remove(); }

    function gerarOpcoesMes() {
        const select = document.getElementById('filtroMes');
        const agora = new Date();
        for(let i = -2; i <= 4; i++) {
            const d = new Date(agora.getFullYear(), agora.getMonth() + i, 1);
            const key = `${String(d.getMonth() + 1).padStart(2, '0')}-${d.getFullYear()}`;
            const label = d.toLocaleDateString('pt-br', {month: 'long', year: 'numeric'});
            const opt = document.createElement('option');
            opt.value = key; opt.innerText = label.charAt(0).toUpperCase() + label.slice(1);
            if(key === mesAtual) opt.selected = true;
            select.appendChild(opt);
        }
    }

    function carregarPortalCliente() {
        db.ref(`cobrancas/${mesAtual}/${idCliente}`).on('value', s => {
            const p = s.val();
            if(p) {
                document.getElementById('cNome').innerText = "Olá, " + p.nome;
                document.getElementById('cValor').innerText = p.valor.toLocaleString('pt-br',{minimumFractionDigits:2});
            }
        });
    }

    function lerFoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('imgPreview').src = e.target.result;
                document.getElementById('imgPreview').classList.remove('hidden');
                db.ref(`cobrancas/${mesAtual}/${idCliente}`).update({ pago: true, comprovante: e.target.result });
                alert("✅ Comprovante enviado com sucesso!");
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function verFoto(img) {
        const v = window.open("");
        v.document.write(`<body style="margin:0; background:#000; display:flex; align-items:center; justify-content:center"><img src="${img}" style="max-height:100%; max-width:100%"></body>`);
    }

    iniciar();
</script>
</body>
</html>
