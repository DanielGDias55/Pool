<!DOCTYPE html>
<html lang="pt-br" class="transition-colors duration-300">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Manager SaaS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { slate: { 850: '#1e293b', 950: '#020617' } }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        html.dark { background-color: #020617 !important; }
        html.dark body { background-color: #020617 !important; color: #f1f5f9 !important; }
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .admin-only, .client-only { display: none; }
        body.modo-admin .admin-only { display: block; }
        body.modo-cliente .client-only { display: block; }
        .editable-input { background: transparent; border: 1px solid transparent; padding: 2px 5px; border-radius: 4px; transition: 0.2s; }
        .editable-input:hover { background: rgba(0,0,0,0.05); border-color: #cbd5e1; }
        .dark .editable-input:hover { background: rgba(255,255,255,0.1); border-color: #334155; }
        .editable-input:focus { background: white; border-color: #3b82f6; outline: none; }
        .dark .editable-input:focus { background: #0f172a; color: white !important; }
        #modalImport { display: none; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        #modalImport.flex { display: flex; }
        .filter-btn.active { background-color: white; color: #1e293b; font-weight: 700; }
        .dark .filter-btn.active { background-color: #3b82f6 !important; color: white !important; opacity: 1 !important; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

<div id="modalImport" onclick="fecharModal()">
    <div class="bg-white dark:bg-slate-900 w-full max-w-lg p-8 rounded-3xl shadow-2xl mx-4" onclick="event.stopPropagation()">
        <h3 class="text-xl font-black mb-2 dark:text-white">Cadastro em Massa</h3>
        <p class="text-xs text-slate-500 mb-4">Nome, Telefone (um por linha)</p>
        <textarea id="listaNomes" rows="8" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-4 text-sm dark:text-white focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
        <div class="flex gap-3 mt-6">
            <button onclick="fecharModal()" class="flex-1 py-3 font-bold text-slate-500">Cancelar</button>
            <button onclick="processarImportacao()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">Importar</button>
        </div>
    </div>
</div>

<div class="max-w-6xl mx-auto px-4 py-8">
    <div class="admin-only space-y-6">
        <header class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 flex flex-col lg:flex-row justify-between items-center gap-4 shadow-sm">
            <div class="w-full lg:w-auto">
                <h1 class="text-2xl font-black tracking-tight dark:text-white flex items-center gap-2">
                    <i data-lucide="layout-grid" class="text-blue-600"></i> Participantes do Pool
                </h1>
                <select id="filtroMes" onchange="mudarMes(this.value)" class="mt-2 bg-slate-100 dark:bg-slate-800 dark:text-white border-none rounded-lg px-3 py-1.5 text-sm font-bold focus:ring-2 focus:ring-blue-500 cursor-pointer"></select>
            </div>
            
            <div class="flex flex-wrap items-center gap-2">
                <div class="bg-slate-100 dark:bg-slate-800 p-1 rounded-xl flex gap-1">
                    <button onclick="setFiltroStatus('todos')" id="btn-todos" class="filter-btn active px-4 py-1.5 rounded-lg text-sm font-bold transition">Todos</button>
                    <button onclick="setFiltroStatus('pendente')" id="btn-pendente" class="filter-btn px-4 py-1.5 rounded-lg text-sm font-bold opacity-40 dark:text-slate-300">Pendentes</button>
                    <button onclick="setFiltroStatus('pago')" id="btn-pago" class="filter-btn px-4 py-1.5 rounded-lg text-sm font-bold opacity-40 dark:text-slate-300">Pagos</button>
                </div>
                <button onclick="abrirModal()" class="bg-slate-100 dark:bg-slate-800 dark:text-white px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition"><i data-lucide="plus-square" class="w-4 h-4 text-blue-500"></i> Importar</button>
                <button onclick="adicionarPessoa()" class="bg-blue-600 text-white px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-blue-500/20 transition"><i data-lucide="user-plus" class="w-4 h-4"></i> Novo</button>
                <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-yellow-400">
                    <i data-lucide="moon" class="dark:hidden"></i><i data-lucide="sun" class="hidden dark:block"></i>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-1 italic">Previsão Total</p>
                <div class="text-3xl font-black dark:text-white">R$ <span id="tGeral">0,00</span></div>
            </div>
            <div class="bg-emerald-500 p-6 rounded-2xl text-white shadow-xl shadow-emerald-500/20">
                <p class="opacity-70 text-[10px] font-black uppercase tracking-widest mb-1 italic">Confirmado</p>
                <div class="text-3xl font-black">R$ <span id="tPago">0,00</span></div>
            </div>
            <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 border-l-4 border-l-rose-500 shadow-sm">
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1 italic">A receber</p>
                <div class="text-3xl font-black text-rose-500">R$ <span id="tPend">0,00</span></div>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm">
            <table class="w-full text-left">
                <thead class="bg-slate-50 dark:bg-slate-850 border-b border-slate-200 dark:border-slate-800 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                    <tr>
                        <th class="px-6 py-4 cursor-pointer hover:text-blue-600 transition" onclick="toggleOrdemAlfabetica()">Participante <i data-lucide="chevrons-up-down" class="inline w-3 h-3"></i></th>
                        <th class="px-6 py-4 text-center">Valor</th>
                        <th class="px-6 py-4 text-center">Status</th>
                        <th class="px-6 py-4 text-right">Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
            </table>
        </div>
    </div>

    <div class="client-only max-w-md mx-auto py-10">
        <div class="bg-white dark:bg-slate-900 rounded-[3rem] shadow-2xl border border-slate-100 dark:border-slate-800 overflow-hidden">
            <div class="bg-blue-600 p-12 text-center text-white">
                <p class="text-xs font-black uppercase tracking-widest opacity-80 mb-2" id="cNome">Olá!</p>
                <h2 class="text-6xl font-black">R$ <span id="cValor">0,00</span></h2>
            </div>
            <div class="p-10 space-y-6 text-center">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Chave PIX</p>
                <p id="cChavePixExibicao" class="font-mono font-bold text-lg dark:text-white select-all break-all">---</p>
                <input type="file" id="fotoInput" accept="image/*" class="hidden" onchange="lerFoto(this)">
                <label for="fotoInput" class="flex flex-col items-center justify-center gap-4 w-full bg-slate-50 dark:bg-slate-850 border-2 border-dashed border-slate-200 dark:border-slate-700 p-8 rounded-[2.5rem] cursor-pointer hover:border-blue-500 transition-all">
                    <i data-lucide="camera" class="w-8 h-8 text-blue-500"></i>
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Enviar Comprovante</span>
                </label>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBKuldmBQEuNyEWVZ-0sPW0ItGn8QqPxd8",
        authDomain: "pool-e439a.firebaseapp.com",
        databaseURL: "https://pool-e439a-default-rtdb.firebaseio.com",
        projectId: "pool-e439a",
        storageBucket: "pool-e439a.firebasestorage.app",
        messagingSenderId: "94463318724",
        appId: "1:94463318724:web:05208de1c8a9cbfd014791"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let mesAtual = `${String(new Date().getMonth() + 1).padStart(2, '0')}-${new Date().getFullYear()}`;
    let dadosLocais = [];
    let filtroStatus = 'todos';
    let ordemCrescente = true;
    let idCliente = new URLSearchParams(window.location.search).get('p');
    let configGeral = { chavePix: "", valorPadrao: 0 };

    function iniciar() {
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        db.ref('configuracoes').on('value', s => {
            configGeral = s.val() || { chavePix: "", valorPadrao: 0 };
        });

        gerarOpcoesMes();
        if (idCliente) { carregarPortalCliente(); document.body.className = "modo-cliente"; }
        else { carregarDadosAdmin(); document.body.className = "modo-admin"; }
        lucide.createIcons();
    }

    function toggleDarkMode() {
        const h = document.documentElement;
        if (h.classList.contains('dark')) { h.classList.remove('dark'); localStorage.theme = 'light'; }
        else { h.classList.add('dark'); localStorage.theme = 'dark'; }
    }

    function carregarDadosAdmin() {
        db.ref(`cobrancas/${mesAtual}`).on('value', s => {
            const dados = s.val() || {};
            dadosLocais = Object.keys(dados).map(id => ({ id, ...dados[id] }));
            renderizarTabela();
        });
    }

    function renderizarTabela() {
        const corpo = document.getElementById('corpoTabela');
        let filtrados = [...dadosLocais];
        if (filtroStatus !== 'todos') filtrados = filtrados.filter(p => filtroStatus === 'pago' ? p.pago : !p.pago);
        filtrados.sort((a,b) => ordemCrescente ? a.nome.localeCompare(b.nome) : b.nome.localeCompare(a.nome));

        corpo.innerHTML = "";
        let t = 0, pg = 0, pd = 0;

        filtrados.forEach(p => {
            const val = parseFloat(p.valor) || 0;
            t += val; if(p.pago) pg += val; else pd += val;
            corpo.innerHTML += `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-850/30 transition">
                    <td class="px-6 py-4">
                        <input type="text" value="${p.nome}" onblur="editar('${p.id}','nome',this.value)" class="editable-input font-bold text-slate-800 dark:text-white w-full block">
                        <input type="text" value="${p.tel}" onblur="editar('${p.id}','tel',this.value)" class="editable-input text-[10px] text-slate-400 dark:text-slate-500 font-bold w-full">
                    </td>
                    <td class="px-6 py-4 text-center dark:text-white">
                        <div class="font-mono font-bold italic">R$ <input type="number" step="0.01" value="${val.toFixed(2)}" onblur="editar('${p.id}','valor',this.value)" class="editable-input w-24 text-center text-slate-800 dark:text-white"></div>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="togglePago('${p.id}',${p.pago})" class="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest transition ${p.pago ? 'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600' : 'bg-amber-100 dark:bg-amber-900/40 text-amber-600'}">
                            ${p.pago ? 'Pago' : 'Pendente'}
                        </button>
                    </td>
                    <td class="px-6 py-4 text-right space-x-1">
                        <button onclick="enviarZap('${p.id}','${p.nome}','${p.tel}',${val})" class="p-2 text-slate-400 hover:text-emerald-500 transition inline-flex"><i data-lucide="send" class="w-4 h-4"></i></button>
                        <button onclick="excluir('${p.id}')" class="p-2 text-slate-300 dark:text-slate-700 hover:text-rose-500 transition inline-flex"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                </tr>`;
        });
        document.getElementById('tGeral').innerText = t.toLocaleString('pt-br',{minimumFractionDigits:2});
        document.getElementById('tPago').innerText = pg.toLocaleString('pt-br',{minimumFractionDigits:2});
        document.getElementById('tPend').innerText = pd.toLocaleString('pt-br',{minimumFractionDigits:2});
        lucide.createIcons();
    }

    function setFiltroStatus(status) {
        filtroStatus = status;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.add('opacity-40'));
        document.getElementById(`btn-${status}`).classList.remove('opacity-40');
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${status}`).classList.add('active');
        renderizarTabela();
    }

    function enviarZap(id, nome, tel, valor) {
        const link = window.location.href.split('?')[0] + "?p=" + id;
        
        const p = mesAtual.split('-');
        const dataObjeto = new Date(p[1], p[0] - 1);
        const nomeMes = dataObjeto.toLocaleDateString('pt-br', { month: 'long', year: 'numeric' });

        // Mensagem sem emojis complexos para evitar erros de codificação
        const msg = encodeURIComponent(
            `Olá, ${nome}! Tudo bem?\n\n` +
            `Passando para enviar o valo das bolinhas *${nomeMes}*.\n\n` +
            `*Valor:* R$ ${valor.toFixed(2).replace('.', ',')}\n` +
            `*PIX:* ${configGeral.chavePix}\n\n` +
            `Para facilitar, voce pode enviar o comprovante por este link:\n${link}\n\n` +
            `Qualquer dúvida, estou a disposição!`
        );
        window.open(`https://wa.me/${tel}?text=${msg}`);
    }

    function processarImportacao() {
        const texto = document.getElementById('listaNomes').value;
        const linhas = texto.split('\n').filter(l => l.trim().length > 0);
        const updates = {};
        linhas.forEach(linha => {
            let [nome, tel] = linha.split(',').map(item => item.trim());
            const id = Date.now() + Math.floor(Math.random() * 9999);
            updates[id] = { nome, tel: tel || "55", valor: configGeral.valorPadrao || 0, pago: false, comprovante: null };
        });
        db.ref(`cobrancas/${mesAtual}`).update(updates).then(() => { fecharModal(); });
    }

    function fecharModal() { document.getElementById('modalImport').classList.remove('flex'); }
    function abrirModal() { document.getElementById('modalImport').classList.add('flex'); }
    function editar(id, c, v) { db.ref(`cobrancas/${mesAtual}/${id}`).update({ [c]: v }); }
    function togglePago(id, s) { db.ref(`cobrancas/${mesAtual}/${id}`).update({ pago: !s }); }
    function excluir(id) { if(confirm("Apagar?")) db.ref(`cobrancas/${mesAtual}/${id}`).remove(); }
    function salvarConfig(c, v) { db.ref('configuracoes').update({ [c]: v }); }
    function mudarMes(v) { mesAtual = v; carregarDadosAdmin(); }
    function toggleOrdemAlfabetica() { ordemCrescente = !ordemCrescente; renderizarTabela(); }
    function adicionarPessoa() { const n = prompt("Nome:"); if(n) db.ref(`cobrancas/${mesAtual}/${Date.now()}`).set({ nome: n, tel: "55", valor: configGeral.valorPadrao || 0, pago: false, comprovante: null }); }
    
    function gerarOpcoesMes() {
        const s = document.getElementById('filtroMes');
        const a = new Date();
        for(let i = -2; i <= 4; i++) {
            const d = new Date(a.getFullYear(), a.getMonth() + i, 1);
            const k = `${String(d.getMonth() + 1).padStart(2, '0')}-${d.getFullYear()}`;
            const o = document.createElement('option');
            o.value = k; o.innerText = d.toLocaleDateString('pt-br', {month: 'long', year: 'numeric'});
            if(k === mesAtual) o.selected = true;
            s.appendChild(o);
        }
    }

    function carregarPortalCliente() {
        db.ref(`cobrancas/${mesAtual}/${idCliente}`).on('value', s => {
            const p = s.val();
            if(p) {
                document.getElementById('cNome').innerText = "Olá, " + p.nome;
                document.getElementById('cValor').innerText = p.valor.toLocaleString('pt-br',{minimumFractionDigits:2});
            }
        });
    }

    function lerFoto(i) {
        if (i.files && i.files[0]) {
            const r = new FileReader();
            r.onload = e => {
                db.ref(`cobrancas/${mesAtual}/${idCliente}`).update({ pago: true, comprovante: e.target.result });
                alert("Comprovante enviado!");
            };
            r.readAsDataURL(i.files[0]);
        }
    }

    iniciar();
</script>
</body>
</html>
