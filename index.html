<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Billing System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .admin-only, .client-only { display: none; }
        body.modo-admin .admin-only { display: block; }
        body.modo-cliente .client-only { display: block; }
        
        /* Estilo de Input Editável na Tabela */
        .editable-input {
            background: transparent;
            border: 1px solid transparent;
            transition: all 0.2s;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .editable-input:hover { border-color: #e2e8f0; background: #fff; }
        .editable-input:focus { border-color: #3b82f6; background: #fff; outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<div class="max-w-5xl mx-auto px-4 py-8">
    
    <div class="admin-only space-y-6">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="layout-dashboard" class="text-blue-600"></i> Gestão Pool
                </h1>
                <p class="text-slate-500 text-sm">Controle de cobranças e recebimentos</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="adicionarPessoa()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2 transition shadow-sm">
                    <i data-lucide="user-plus" class="w-4 h-4"></i> Novo Participante
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-slate-500 text-sm font-medium">Total Geral</span>
                    <i data-lucide="banknote" class="w-4 h-4 text-slate-400"></i>
                </div>
                <div class="text-2xl font-bold text-slate-800">R$ <span id="tGeral">0,00</span></div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-emerald-500">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-slate-500 text-sm font-medium">Total Pago</span>
                    <i data-lucide="check-circle" class="w-4 h-4 text-emerald-500"></i>
                </div>
                <div class="text-2xl font-bold text-emerald-600">R$ <span id="tPago">0,00</span></div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-rose-500">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-slate-500 text-sm font-medium">Pendente</span>
                    <i data-lucide="clock" class="w-4 h-4 text-rose-500"></i>
                </div>
                <div class="text-2xl font-bold text-rose-600">R$ <span id="tPend">0,00</span></div>
            </div>
        </div>

        <div class="bg-slate-800 text-white p-4 rounded-xl flex flex-col md:flex-row items-center gap-4 shadow-lg">
            <div class="flex items-center gap-3 flex-1">
                <i data-lucide="qr-code" class="text-blue-400"></i>
                <span class="text-sm font-medium text-slate-300 whitespace-nowrap">Chave PIX Ativa:</span>
                <input type="text" id="chavePix" onchange="salvarChave(this.value)" class="bg-slate-700 border-none rounded px-3 py-1 text-white w-full max-w-md focus:ring-2 focus:ring-blue-500 transition" placeholder="Sua chave aqui">
            </div>
        </div>

        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-bottom border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Participante</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-center">Valor (R$)</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-center">Status</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="client-only max-w-md mx-auto">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <div class="bg-blue-600 p-8 text-center text-white">
                <h2 class="text-lg opacity-90 mb-1" id="cNome">Olá!</h2>
                <div class="text-4xl font-bold">R$ <span id="cValor">0,00</span></div>
            </div>
            
            <div class="p-8 space-y-6">
                <div class="text-center">
                    <p class="text-sm text-slate-500 mb-2 font-medium">Chave PIX para pagamento:</p>
                    <div class="bg-slate-100 p-4 rounded-xl font-mono text-blue-700 font-bold break-all border border-slate-200 relative group">
                        <span id="cChavePixExibicao">---</span>
                    </div>
                </div>

                <div class="space-y-4">
                    <p class="text-center text-sm font-semibold text-slate-700">Anexe o comprovante:</p>
                    <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-300 rounded-xl cursor-pointer hover:bg-slate-50 transition">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6 text-slate-400">
                            <i data-lucide="camera" class="w-8 h-8 mb-2"></i>
                            <p class="text-xs uppercase tracking-wider font-bold">Tirar foto ou Escolher</p>
                        </div>
                        <input type="file" id="fotoInput" accept="image/*" class="hidden" onchange="lerFoto(this)">
                    </label>
                    <img id="imgPreview" class="w-full h-48 object-cover rounded-xl border border-slate-200 hidden shadow-inner">
                </div>

                <button id="btnConfirmar" onclick="confirmarPagamento()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-emerald-100 flex items-center justify-center gap-2">
                    <i data-lucide="send"></i> ENVIAR COMPROVANTE
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // Configurações (As mesmas que você já utiliza)
    const firebaseConfig = {
        apiKey: "AIzaSyBKuldmBQEuNyEWVZ-0sPW0ItGn8QqPxd8",
        authDomain: "pool-e439a.firebaseapp.com",
        databaseURL: "https://pool-e439a-default-rtdb.firebaseio.com",
        projectId: "pool-e439a",
        storageBucket: "pool-e439a.firebasestorage.app",
        messagingSenderId: "94463318724",
        appId: "1:94463318724:web:05208de1c8a9cbfd014791"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const mesReferencia = `${String(new Date().getMonth() + 1).padStart(2, '0')}-${new Date().getFullYear()}`;
    let idCliente = new URLSearchParams(window.location.search).get('p');
    let chavePixAtual = "";

    function iniciar() {
        db.ref('configuracoes/chavePix').on('value', snapshot => {
            chavePixAtual = snapshot.val() || "Não configurada";
            document.getElementById('chavePix').value = chavePixAtual;
            if (idCliente) document.getElementById('cChavePixExibicao').innerText = chavePixAtual;
        });

        if (idCliente) {
            document.body.className = "modo-cliente bg-slate-100";
            carregarPortalCliente();
        } else {
            document.body.className = "modo-admin";
            escutarCobrancasAdmin();
        }
        lucide.createIcons();
    }

    // --- ADMIN: Lógica de Edição Direta ---
    function escutarCobrancasAdmin() {
        db.ref('cobrancas/' + mesReferencia).on('value', snapshot => {
            const dados = snapshot.val();
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = "";
            let t = 0, pg = 0, pd = 0;

            if (dados) {
                Object.keys(dados).forEach(id => {
                    const p = dados[id];
                    t += parseFloat(p.valor) || 0;
                    if(p.pago) pg += parseFloat(p.valor); else pd += parseFloat(p.valor);

                    corpo.innerHTML += `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="px-6 py-4">
                                <input type="text" value="${p.nome}" onblur="editarDado('${id}', 'nome', this.value)" class="editable-input font-semibold text-slate-700 w-full mb-1">
                                <input type="text" value="${p.tel}" onblur="editarDado('${id}', 'tel', this.value)" class="editable-input text-xs text-slate-500 w-full">
                            </td>
                            <td class="px-6 py-4 text-center">
                                <div class="flex items-center justify-center gap-1 text-slate-600 font-mono">
                                    <span>R$</span>
                                    <input type="number" step="0.01" value="${p.valor.toFixed(2)}" onblur="editarDado('${id}', 'valor', parseFloat(this.value))" class="editable-input w-20 text-center font-bold">
                                </div>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <button onclick="alternarStatus('${id}', ${p.pago})" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${p.pago ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}">
                                    ${p.pago ? 'Pago' : 'Pendente'}
                                </button>
                            </td>
                            <td class="px-6 py-4 text-right space-x-2">
                                <button onclick="enviarZap('${id}','${p.nome}','${p.tel}',${p.valor})" class="p-2 bg-emerald-50 text-emerald-600 rounded-lg hover:bg-emerald-500 hover:text-white transition inline-flex"><i data-lucide="message-square" class="w-4 h-4"></i></button>
                                ${p.comprovante ? `<button onclick="verFoto('${p.comprovante}')" class="p-2 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-500 hover:text-white transition inline-flex"><i data-lucide="eye" class="w-4 h-4"></i></button>` : ''}
                                <button onclick="excluirPessoa('${id}')" class="p-2 bg-rose-50 text-rose-600 rounded-lg hover:bg-rose-500 hover:text-white transition inline-flex"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </td>
                        </tr>`;
                });
            }
            document.getElementById('tGeral').innerText = t.toLocaleString('pt-br', {minimumFractionDigits: 2});
            document.getElementById('tPago').innerText = pg.toLocaleString('pt-br', {minimumFractionDigits: 2});
            document.getElementById('tPend').innerText = pd.toLocaleString('pt-br', {minimumFractionDigits: 2});
            lucide.createIcons();
        });
    }

    function editarDado(id, campo, valor) {
        db.ref(`cobrancas/${mesReferencia}/${id}`).update({ [campo]: valor });
    }

    function alternarStatus(id, statusAtual) {
        db.ref(`cobrancas/${mesReferencia}/${id}`).update({ pago: !statusAtual });
    }

    function adicionarPessoa() {
        const nome = prompt("Nome do Cliente:");
        const tel = prompt("WhatsApp (Ex: 5511999999999):", "55");
        const valor = parseFloat(prompt("Valor da Cobrança:", "0"));
        if (nome && tel && !isNaN(valor)) {
            const novoId = Date.now();
            db.ref(`cobrancas/${mesReferencia}/${novoId}`).set({ nome, tel, valor, pago: false, comprovante: null });
        }
    }

    // --- CLIENTE E AUXILIARES ---
    function carregarPortalCliente() {
        db.ref(`cobrancas/${mesReferencia}/${idCliente}`).on('value', snapshot => {
            const p = snapshot.val();
            if (p) {
                document.getElementById('cNome').innerText = "Olá, " + p.nome;
                document.getElementById('cValor').innerText = p.valor.toLocaleString('pt-br', {minimumFractionDigits: 2});
            }
        });
    }

    function lerFoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('imgPreview');
                img.src = e.target.result;
                img.classList.remove('hidden');
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function confirmarPagamento() {
        const foto = document.getElementById('imgPreview').src;
        if (!foto.startsWith('data:image')) return alert("Selecione o comprovante.");
        db.ref(`cobrancas/${mesReferencia}/${idCliente}`).update({ pago: true, comprovante: foto })
          .then(() => alert("✅ Enviado!"));
    }

    function enviarZap(id, nome, tel, valor) {
        const link = window.location.href.split('?')[0] + "?p=" + id;
        const msg = encodeURIComponent(`Olá ${nome}! Seu valor é R$ ${valor.toFixed(2)}. Pague via PIX: ${chavePixAtual} e envie o comprovante por aqui: ${link}`);
        window.open(`https://wa.me/${tel}?text=${msg}`);
    }

    function verFoto(img) {
        const v = window.open("");
        v.document.write(`<body style="margin:0; background:#0f172a; display:flex; align-items:center; justify-content:center"><img src="${img}" style="max-width:95%; border-radius:12px; shadow: 20px"></body>`);
    }

    function excluirPessoa(id) { if(confirm("Remover participante?")) db.ref(`cobrancas/${mesReferencia}/${id}`).remove(); }
    function salvarChave(val) { db.ref('configuracoes/chavePix').set(val); }

    iniciar();
</script>
</body>
</html>
