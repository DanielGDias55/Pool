<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Cobrança Pool</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --primary: #2563eb; --success: #22c55e; --danger: #ef4444; --whatsapp: #25d366; --bg: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); margin: 0; padding: 10px; color: #1e293b; }
        
        .admin-only, .client-only { display: none; }
        body.modo-admin .admin-only { display: block; }
        body.modo-cliente .client-only { display: flex; flex-direction: column; align-items: center; }

        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .pix-config { background: #eff6ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #dbeafe; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { padding: 10px; border-radius: 8px; color: white; text-align: center; font-weight: bold; font-size: 13px; }
        
        .table-res { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #f1f5f9; padding: 10px; text-align: left; font-size: 12px; }
        td { padding: 10px; border-bottom: 1px solid #eee; }

        input { padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; width: 100%; }
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; justify-content: center; }
        .btn-add { background: var(--primary); color: white; width: 100%; margin: 15px 0; }
        
        .client-box { width: 100%; max-width: 400px; text-align: center; }
        .preview-img { width: 100%; max-height: 250px; object-fit: contain; margin-top: 15px; border: 2px dashed #ccc; display: none; }
        .file-label { background: #475569; color: white; padding: 15px; border-radius: 8px; display: block; margin: 15px 0; cursor: pointer; }
    </style>
</head>
<body class="modo-admin">

<div class="container">
    
    <div class="admin-only">
        <h2>📊 Gestão Pool - Cloud</h2>
        
        <div class="pix-config">
            <strong>Minha Chave PIX:</strong>
            <input type="text" id="chavePix" placeholder="Digite sua chave e aperte Enter" onchange="salvarChave(this.value)">
        </div>

        <div class="stats">
            <div class="stat-card" style="background:var(--primary)">Total<br>R$ <span id="tGeral">0</span></div>
            <div class="stat-card" style="background:var(--success)">Pago<br>R$ <span id="tPago">0</span></div>
            <div class="stat-card" style="background:var(--danger)">Pend.<br>R$ <span id="tPend">0</span></div>
        </div>

        <button class="btn btn-add" onclick="adicionarPessoa()">+ Adicionar Nova Pessoa</button>

        <div class="table-res">
            <table>
                <thead>
                    <tr>
                        <th>Nome / WhatsApp</th>
                        <th>Valor</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>

    <div class="client-only client-box">
        <h2 id="cNome">Olá!</h2>
        <div style="background:#f0fdf4; padding:20px; border-radius:10px; width:100%">
            <p>Valor a pagar:</p>
            <h1 style="color:var(--primary); margin:0">R$ <span id="cValor">0,00</span></h1>
            <div id="qrcodeCliente" style="display:flex; justify-content:center; margin:15px 0"></div>
            <p style="font-size:12px; color:#666">Pague via QR Code ou Chave PIX acima</p>
        </div>

        <p style="margin-top:20px"><strong>Anexe seu comprovante:</strong></p>
        <label for="fotoInput" class="file-label">📸 Escolher Foto ou Câmera</label>
        <input type="file" id="fotoInput" accept="image/*" onchange="lerFoto(this)" style="display:none">
        
        <img id="imgPreview" class="preview-img">
        
        <button id="btnConfirmar" class="btn" style="background:var(--success); color:white; width:100%; padding:18px; margin-top:20px; font-size:16px" onclick="confirmarPagamento()">
            ENVIAR COMPROVANTE
        </button>
    </div>

</div>

<script>
    // Configurações do seu Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBKuldmBQEuNyEWVZ-0sPW0ItGn8QqPxd8",
        authDomain: "pool-e439a.firebaseapp.com",
        databaseURL: "https://pool-e439a-default-rtdb.firebaseio.com",
        projectId: "pool-e439a",
        storageBucket: "pool-e439a.firebasestorage.app",
        messagingSenderId: "94463318724",
        appId: "1:94463318724:web:05208de1c8a9cbfd014791"
    };

    // Inicialização
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const mesReferencia = `${String(new Date().getMonth() + 1).padStart(2, '0')}-${new Date().getFullYear()}`;

    let idCliente = new URLSearchParams(window.location.search).get('p');
    let chavePixAtual = "";

    function iniciar() {
        // Busca a chave PIX salva
        db.ref('configuracoes/chavePix').on('value', snapshot => {
            chavePixAtual = snapshot.val() || "Não configurada";
            if (!idCliente) document.getElementById('chavePix').value = chavePixAtual;
        });

        if (idCliente) {
            document.body.className = "modo-cliente";
            carregarPortalCliente();
        } else {
            document.body.className = "modo-admin";
            escutarCobrancasAdmin();
        }
    }

    // --- LÓGICA DO ADMINISTRADOR ---
    function escutarCobrancasAdmin() {
        db.ref('cobrancas/' + mesReferencia).on('value', snapshot => {
            const dados = snapshot.val();
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = "";
            let t = 0, pg = 0, pd = 0;

            if (dados) {
                Object.keys(dados).forEach(id => {
                    const p = dados[id];
                    t += p.valor || 0;
                    if(p.pago) pg += p.valor; else pd += p.valor;

                    corpo.innerHTML += `
                        <tr>
                            <td>
                                <strong>${p.nome}</strong><br>
                                <small>${p.tel}</small>
                            </td>
                            <td>R$ ${p.valor.toFixed(2)}</td>
                            <td><span style="font-size:20px">${p.pago ? '✅' : '⏳'}</span></td>
                            <td>
                                <div style="display:flex; gap:5px">
                                    <button class="btn" style="background:var(--whatsapp); color:white" onclick="enviarZap('${id}','${p.nome}','${p.tel}',${p.valor})">📲</button>
                                    ${p.comprovante ? `<button class="btn" onclick="verFoto('${p.comprovante}')">👁️</button>` : ''}
                                    <button class="btn" onclick="excluirPessoa('${id}')" style="background:#fee2e2">🗑️</button>
                                </div>
                            </td>
                        </tr>`;
                });
            }
            document.getElementById('tGeral').innerText = t.toFixed(2);
            document.getElementById('tPago').innerText = pg.toFixed(2);
            document.getElementById('tPend').innerText = pd.toFixed(2);
        });
    }

    function adicionarPessoa() {
        const nome = prompt("Nome do Cliente:");
        const tel = prompt("WhatsApp (Ex: 5511999999999):", "55");
        const valor = parseFloat(prompt("Valor da Cobrança:", "0"));
        
        if (nome && tel && !isNaN(valor)) {
            const novoId = Date.now();
            db.ref('cobrancas/' + mesReferencia + '/' + novoId).set({
                nome, tel, valor, pago: false, comprovante: null
            });
        }
    }

    function enviarZap(id, nome, tel, valor) {
        const link = window.location.href.split('?')[0] + "?p=" + id;
        const msg = encodeURIComponent(`Olá ${nome}!\nValor: R$ ${valor.toFixed(2)}\nPIX: ${chavePixAtual}\n\nEnvie o comprovante aqui: ${link}`);
        window.open(`https://wa.me/${tel}?text=${msg}`);
    }

    function excluirPessoa(id) { if(confirm("Deseja excluir?")) db.ref('cobrancas/'+mesReferencia+'/'+id).remove(); }
    function salvarChave(val) { db.ref('configuracoes/chavePix').set(val); }

    // --- LÓGICA DO CLIENTE ---
    function carregarPortalCliente() {
        db.ref('cobrancas/' + mesReferencia + '/' + idCliente).on('value', snapshot => {
            const p = snapshot.val();
            if (p) {
                document.getElementById('cNome').innerText = "Olá, " + p.nome;
                document.getElementById('cValor').innerText = p.valor.toFixed(2);
                
                const qrDiv = document.getElementById("qrcodeCliente");
                qrDiv.innerHTML = "";
                new QRCode(qrDiv, { text: chavePixAtual, width: 160, height: 160 });
            } else {
                alert("Cobrança não encontrada.");
            }
        });
    }

    function lerFoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('imgPreview');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function confirmarPagamento() {
        const foto = document.getElementById('imgPreview').src;
        if (!foto.startsWith('data:image')) return alert("Por favor, selecione a foto do comprovante.");

        db.ref('cobrancas/' + mesReferencia + '/' + idCliente).update({
            pago: true,
            comprovante: foto
        }).then(() => {
            alert("✅ Comprovante enviado com sucesso!");
            window.location.search = ""; // Volta ao início
        });
    }

    function verFoto(img) {
        const v = window.open("");
        v.document.write(`<body style="margin:0; background:black; display:flex; align-items:center; justify-content:center"><img src="${img}" style="max-width:100%"></body>`);
    }

    iniciar();
</script>
</body>
</html>
