<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Billing Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .admin-only, .client-only { display: none; }
        body.modo-admin .admin-only { display: block; }
        body.modo-cliente .client-only { display: block; }
        .editable-input { background: transparent; border: 1px solid transparent; transition: all 0.2s; padding: 2px 5px; border-radius: 4px; }
        .editable-input:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .editable-input:focus { background: white; border-color: #3b82f6; outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<div class="max-w-6xl mx-auto px-4 py-6">
    
    <div class="admin-only space-y-6">
        <header class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="layers" class="text-blue-600"></i> Dash Pool
                </h1>
                <div class="flex items-center gap-2 mt-2">
                    <select id="filtroMes" onchange="mudarMes(this.value)" class="bg-slate-100 border-none rounded-lg px-3 py-1.5 text-sm font-semibold text-slate-700 focus:ring-2 focus:ring-blue-500">
                        </select>
                    <span id="statusReset" class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-bold uppercase">Ciclo Dia 20</span>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <div class="bg-slate-100 p-1 rounded-xl flex gap-1">
                    <button onclick="setFiltroStatus('todos')" class="filter-btn active bg-white shadow-sm px-4 py-1.5 rounded-lg text-sm font-medium">Todos</button>
                    <button onclick="setFiltroStatus('pendente')" class="filter-btn px-4 py-1.5 rounded-lg text-sm font-medium text-slate-600">Pendentes</button>
                    <button onclick="setFiltroStatus('pago')" class="filter-btn px-4 py-1.5 rounded-lg text-sm font-medium text-slate-600">Pagos</button>
                </div>
                <button onclick="adicionarPessoa()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl font-medium flex items-center gap-2 transition">
                    <i data-lucide="plus" class="w-4 h-4"></i> Novo
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                <p class="text-slate-500 text-xs font-bold uppercase tracking-wider mb-1">Expectativa</p>
                <div class="text-2xl font-black text-slate-800">R$ <span id="tGeral">0,00</span></div>
            </div>
            <div class="bg-emerald-500 p-5 rounded-2xl shadow-lg shadow-emerald-100 text-white">
                <p class="opacity-80 text-xs font-bold uppercase tracking-wider mb-1">Confirmado</p>
                <div class="text-2xl font-black">R$ <span id="tPago">0,00</span></div>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm border-l-4 border-l-rose-500">
                <p class="text-slate-500 text-xs font-bold uppercase tracking-wider mb-1">A receber</p>
                <div class="text-2xl font-black text-rose-600">R$ <span id="tPend">0,00</span></div>
            </div>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-4">
                            <button onclick="toggleOrdemAlfabetica()" class="flex items-center gap-1 text-xs font-bold text-slate-500 uppercase tracking-widest hover:text-blue-600 transition">
                                Participante <i data-lucide="arrow-up-down" class="w-3 h-3"></i>
                            </button>
                        </th>
                        <th class="px-6 py-4 text-center text-xs font-bold text-slate-500 uppercase">Valor</th>
                        <th class="px-6 py-4 text-center text-xs font-bold text-slate-500 uppercase">Status</th>
                        <th class="px-6 py-4 text-right text-xs font-bold text-slate-500 uppercase">Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </div>

    <div class="client-only max-w-md mx-auto py-10">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100">
            <div class="bg-slate-900 p-10 text-center">
                <p class="text-blue-400 text-sm font-bold uppercase tracking-widest mb-2" id="cNome">Olá!</p>
                <h2 class="text-white text-5xl font-black">R$ <span id="cValor">0,00</span></h2>
            </div>
            <div class="p-8 space-y-6">
                <div class="bg-slate-50 border border-slate-200 rounded-2xl p-4 text-center">
                    <p class="text-xs text-slate-400 font-bold uppercase mb-2">Chave PIX</p>
                    <p id="cChavePixExibicao" class="text-slate-700 font-mono font-bold break-all">---</p>
                </div>
                <input type="file" id="fotoInput" accept="image/*" class="hidden" onchange="lerFoto(this)">
                <label for="fotoInput" class="flex items-center justify-center gap-2 w-full bg-blue-600 text-white py-4 rounded-2xl font-bold cursor-pointer hover:bg-blue-700 transition">
                    <i data-lucide="camera"></i> ENVIAR COMPROVANTE
                </label>
                <img id="imgPreview" class="w-full rounded-2xl hidden shadow-lg">
            </div>
        </div>
    </div>
</div>

<script>
    // Configurações Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBKuldmBQEuNyEWVZ-0sPW0ItGn8QqPxd8",
        authDomain: "pool-e439a.firebaseapp.com",
        databaseURL: "https://pool-e439a-default-rtdb.firebaseio.com",
        projectId: "pool-e439a",
        storageBucket: "pool-e439a.firebasestorage.app",
        messagingSenderId: "94463318724",
        appId: "1:94463318724:web:05208de1c8a9cbfd014791"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Estado da Aplicação
    let mesAtual = `${String(new Date().getMonth() + 1).padStart(2, '0')}-${new Date().getFullYear()}`;
    let filtroStatus = 'todos';
    let ordemCrescente = true;
    let dadosLocais = [];
    let idCliente = new URLSearchParams(window.location.search).get('p');
    let chavePixGlobal = "";

    function iniciar() {
        gerarOpcoesMes();
        verificarResetMensal(); // Lógica do Dia 20
        
        db.ref('configuracoes/chavePix').on('value', s => {
            chavePixGlobal = s.val() || "";
            if(idCliente) document.getElementById('cChavePixExibicao').innerText = chavePixGlobal;
        });

        if (idCliente) {
            document.body.className = "modo-cliente bg-slate-100";
            carregarPortalCliente();
        } else {
            document.body.className = "modo-admin";
            carregarDadosAdmin();
        }
        lucide.createIcons();
    }

    // --- LÓGICA DE CICLO (DIA 20) ---
    async function verificarResetMensal() {
        const hoje = new Date();
        const dia = hoje.getDate();
        
        // Se for dia 20 ou depois, verifica se o próximo mês já tem dados
        if (dia >= 20) {
            const proximoMesData = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 1);
            const proximoMesKey = `${String(proximoMesData.getMonth() + 1).padStart(2, '0')}-${proximoMesData.getFullYear()}`;
            
            const snapshot = await db.ref(`cobrancas/${proximoMesKey}`).once('value');
            
            if (!snapshot.exists()) {
                console.log("Dia 20 detectado. Clonando participantes para o próximo ciclo...");
                const dadosAtuais = await db.ref(`cobrancas/${mesAtual}`).once('value');
                if (dadosAtuais.exists()) {
                    const participantes = dadosAtuais.val();
                    const novosDados = {};
                    Object.keys(participantes).forEach(id => {
                        novosDados[id] = {
                            ...participantes[id],
                            pago: false,
                            comprovante: null
                        };
                    });
                    await db.ref(`cobrancas/${proximoMesKey}`).set(novosDados);
                }
            }
        }
    }

    // --- ADMIN: FILTROS E TABELA ---
    function carregarDadosAdmin() {
        db.ref(`cobrancas/${mesAtual}`).on('value', snapshot => {
            const dados = snapshot.val() || {};
            dadosLocais = Object.keys(dados).map(id => ({ id, ...dados[id] }));
            renderizarTabela();
        });
    }

    function renderizarTabela() {
        const corpo = document.getElementById('corpoTabela');
        let filtrados = [...dadosLocais];

        // 1. Filtro de Status
        if (filtroStatus !== 'todos') {
            filtrados = filtrados.filter(p => filtroStatus === 'pago' ? p.pago : !p.pago);
        }

        // 2. Ordem Alfabética
        filtrados.sort((a, b) => {
            return ordemCrescente ? a.nome.localeCompare(b.nome) : b.nome.localeCompare(a.nome);
        });

        corpo.innerHTML = "";
        let t = 0, pg = 0, pd = 0;

        filtrados.forEach(p => {
            t += parseFloat(p.valor);
            if(p.pago) pg += parseFloat(p.valor); else pd += parseFloat(p.valor);

            corpo.innerHTML += `
                <tr class="group hover:bg-slate-50 transition">
                    <td class="px-6 py-4">
                        <input type="text" value="${p.nome}" onblur="editar('${p.id}','nome',this.value)" class="editable-input font-bold text-slate-700 w-full block">
                        <input type="text" value="${p.tel}" onblur="editar('${p.id}','tel',this.value)" class="editable-input text-xs text-slate-400 w-full block">
                    </td>
                    <td class="px-6 py-4 text-center font-mono font-bold text-slate-600">
                        R$ <input type="number" step="0.01" value="${p.valor}" onblur="editar('${p.id}','valor',this.value)" class="editable-input w-20 text-center">
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="togglePago('${p.id}',${p.pago})" class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest transition ${p.pago ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">
                            ${p.pago ? 'Pago' : 'Pendente'}
                        </button>
                    </td>
                    <td class="px-6 py-4 text-right space-x-1">
                        <button onclick="enviarZap('${p.id}','${p.nome}','${p.tel}',${p.valor})" class="p-2 text-slate-400 hover:text-emerald-500 transition inline-flex"><i data-lucide="send" class="w-4 h-4"></i></button>
                        ${p.comprovante ? `<button onclick="verFoto('${p.comprovante}')" class="p-2 text-blue-500 hover:text-blue-700 transition inline-flex"><i data-lucide="image" class="w-4 h-4"></i></button>` : ''}
                        <button onclick="excluir('${p.id}')" class="p-2 text-slate-300 hover:text-rose-500 transition inline-flex"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                </tr>`;
        });

        document.getElementById('tGeral').innerText = t.toLocaleString('pt-br',{minimumFractionDigits:2});
        document.getElementById('tPago').innerText = pg.toLocaleString('pt-br',{minimumFractionDigits:2});
        document.getElementById('tPend').innerText = pd.toLocaleString('pt-br',{minimumFractionDigits:2});
        lucide.createIcons();
    }

    // --- FUNÇÕES DE INTERAÇÃO ---
    function toggleOrdemAlfabetica() {
        ordemCrescente = !ordemCrescente;
        renderizarTabela();
    }

    function setFiltroStatus(status) {
        filtroStatus = status;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('bg-white', 'shadow-sm', 'text-slate-900');
            btn.classList.add('text-slate-600');
        });
        event.target.classList.add('bg-white', 'shadow-sm', 'text-slate-900');
        renderizarTabela();
    }

    function mudarMes(val) {
        mesAtual = val;
        carregarDadosAdmin();
    }

    function gerarOpcoesMes() {
        const select = document.getElementById('filtroMes');
        const agora = new Date();
        for(let i = -3; i <= 3; i++) {
            const d = new Date(agora.getFullYear(), agora.getMonth() + i, 1);
            const key = `${String(d.getMonth() + 1).padStart(2, '0')}-${d.getFullYear()}`;
            const label = d.toLocaleDateString('pt-br', {month: 'long', year: 'numeric'});
            const opt = document.createElement('option');
            opt.value = key;
            opt.innerText = label.charAt(0).toUpperCase() + label.slice(1);
            if(key === mesAtual) opt.selected = true;
            select.appendChild(opt);
        }
    }

    // CRUD e Auxiliares (Firebase)
    function editar(id, campo, valor) { db.ref(`cobrancas/${mesAtual}/${id}`).update({ [campo]: valor }); }
    function togglePago(id, status) { db.ref(`cobrancas/${mesAtual}/${id}`).update({ pago: !status }); }
    function excluir(id) { if(confirm("Remover?")) db.ref(`cobrancas/${mesAtual}/${id}`).remove(); }
    function adicionarPessoa() {
        const nome = prompt("Nome:");
        if(nome) {
            const id = Date.now();
            db.ref(`cobrancas/${mesAtual}/${id}`).set({ nome, tel: "55", valor: 0, pago: false, comprovante: null });
        }
    }

    // Funções Cliente
    function carregarPortalCliente() {
        db.ref(`cobrancas/${mesAtual}/${idCliente}`).on('value', s => {
            const p = s.val();
            if(p) {
                document.getElementById('cNome').innerText = "Olá, " + p.nome;
                document.getElementById('cValor').innerText = p.valor.toLocaleString('pt-br',{minimumFractionDigits:2});
            }
        });
    }

    function lerFoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('imgPreview');
                img.src = e.target.result;
                img.classList.remove('hidden');
                // Salva automaticamente no Firebase
                db.ref(`cobrancas/${mesAtual}/${idCliente}`).update({ pago: true, comprovante: e.target.result });
                alert("Comprovante enviado!");
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function enviarZap(id, nome, tel, valor) {
        const link = window.location.href.split('?')[0] + "?p=" + id;
        const msg = encodeURIComponent(`Olá ${nome}! Seu valor de ${mesAtual} é R$ ${valor}. Link para comprovante: ${link}`);
        window.open(`https://wa.me/${tel}?text=${msg}`);
    }

    function verFoto(img) {
        const v = window.open("");
        v.document.write(`<body style="margin:0; background:#000; display:flex; align-items:center; justify-content:center"><img src="${img}" style="max-width:100%"></body>`);
    }

    iniciar();
</script>
</body>
</html>
